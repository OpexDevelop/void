name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: warn

jobs:
  # ─────────────────────────────────────────────
  #  1. Core — матрица платформ
  # ─────────────────────────────────────────────
  build-core:
    name: Build core (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # не останавливать всё если одна платформа упала
      matrix:
        include:
          # ── Linux x86_64 ───────────────────────
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: core
            run_tests: true

          # ── Linux arm64 ────────────────────────
          # Нативный arm64-раннер GitHub (бесплатно для публичных репо)
          - name: Linux arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: core
            run_tests: true

          # ── macOS M1 (arm64) ───────────────────
          # macos-latest = macos-14 = M1-раннер
          - name: macOS arm64 (M1)
            os: macos-latest
            target: aarch64-apple-darwin
            binary: core
            run_tests: true

          # ── Windows x86_64 ─────────────────────
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: core.exe
            run_tests: true

          # ── Android aarch64 (Termux) ───────────
          # Собирается под aarch64-linux-android API 24+
          # На Termux: скопировать бинарь и chmod +x
          - name: Android aarch64 (Termux)
            os: ubuntu-latest
            target: aarch64-linux-android
            binary: core
            run_tests: false    # нельзя запустить на хосте

    steps:
      - uses: actions/checkout@v4

      # Устанавливаем Rust + нужный таргет
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Кэш cargo — ключ включает target, чтобы платформы не мешали друг другу
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-core-${{ hashFiles('**/Cargo.lock') }}

      # ── Android: NDK + cargo-ndk ──────────────
      - name: Setup Android NDK
        if: matrix.target == 'aarch64-linux-android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c      # последний LTS-релиз NDK
          add-to-path: false

      - name: Install cargo-ndk
        if: matrix.target == 'aarch64-linux-android'
        run: cargo install cargo-ndk

      # ── Сборка: Android ───────────────────────
      - name: Build release (Android)
        if: matrix.target == 'aarch64-linux-android'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            --target aarch64-linux-android \
            --platform 24 \
            -- build --release -p core

      # ── Сборка: все остальные платформы ────────
      - name: Build release
        if: matrix.target != 'aarch64-linux-android'
        run: cargo build --release --target ${{ matrix.target }} -p core

      # ── Тесты (только нативные платформы) ──────
      - name: Run tests
        if: matrix.run_tests
        run: cargo test --target ${{ matrix.target }} -p core

      # ── Загрузка артефакта ─────────────────────
      - name: Upload core binary
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ─────────────────────────────────────────────
  #  2. Wasm-плагины — без изменений (wasm портабелен)
  # ─────────────────────────────────────────────
  build-plugins:
    name: Build Wasm plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip1 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo (wasm)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build plugin-crypto
        run: cargo build --release --target wasm32-wasip1 -p plugin-crypto

      - name: Build plugin-ntfy
        run: cargo build --release --target wasm32-wasip1 -p plugin-ntfy

      - name: Build plugin-storage
        run: cargo build --release --target wasm32-wasip1 -p plugin-storage

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-plugins
          path: |
            target/wasm32-wasip1/release/plugin_crypto.wasm
            target/wasm32-wasip1/release/plugin_ntfy.wasm
            target/wasm32-wasip1/release/plugin_storage.wasm

  # ─────────────────────────────────────────────
  #  3. Lint — без изменений
  # ─────────────────────────────────────────────
  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - run: cargo fmt --all -- --check
      - run: cargo clippy -p core -- -D warnings
