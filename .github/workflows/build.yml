name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: warn

jobs:
  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: lint-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy core
        run: cargo clippy -p void-core -- -D warnings

      - name: Clippy cli
        run: cargo clippy -p cli -- -D warnings

  build-android:
    name: Build void (Android aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-aarch64-cli-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-aarch64-cli-

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build release (Android)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            --target aarch64-linux-android \
            --platform 24 \
            -- build --release -p cli

      - name: Upload void binary
        uses: actions/upload-artifact@v4
        with:
          name: void-aarch64-linux-android
          path: target/aarch64-linux-android/release/void

  build-plugins:
    name: Build Wasm plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip2
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cache cargo (wasm)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-plugins-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-plugins-

      - name: Build plugins
        run: |
          cargo build --release --target wasm32-wasip2 -p plugin-crypto
          cargo build --release --target wasm32-wasip2 -p plugin-ntfy
          cargo build --release --target wasm32-wasip2 -p plugin-storage

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-plugins
          path: |
            target/wasm32-wasip2/release/plugin_crypto.wasm
            target/wasm32-wasip2/release/plugin_ntfy.wasm
            target/wasm32-wasip2/release/plugin_storage.wasm

  bundle:
    name: Bundle (Android + Wasm plugins)
    runs-on: ubuntu-latest
    needs: [build-android, build-plugins]
    steps:
      - uses: actions/checkout@v4

      - name: Download void binary
        uses: actions/download-artifact@v4
        with:
          name: void-aarch64-linux-android
          path: dist/

      - name: Download wasm plugins
        uses: actions/download-artifact@v4
        with:
          name: wasm-plugins
          path: dist/

      - name: Copy manifests and keys
        run: |
          cp -r manifests dist/
          cp -r keys      dist/

      - name: Make binary executable
        run: chmod +x dist/void

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: void-bundle-android-aarch64
          path: dist/
