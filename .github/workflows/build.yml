name: Build Messenger

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk-version: 26.1.10909125

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,wasm32-wasip1

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Build Rust Core (Android ARM64)
      working-directory: void/core
      run: |
        cargo ndk -t arm64-v8a \
          -o ../flutter_app/android/app/src/main/jniLibs \
          build --release

    - name: Build WASM Plugins
      working-directory: void
      run: |
        cargo build --release -p storage_memory --target wasm32-wasip1
        cargo build --release -p crypto_aes --target wasm32-wasip1
        cargo build --release -p transport_ntfy --target wasm32-wasip1

    - name: Copy WASM to Flutter assets
      working-directory: void
      run: |
        mkdir -p flutter_app/assets/plugins
        cp target/wasm32-wasip1/release/storage_memory.wasm \
           flutter_app/assets/plugins/
        cp target/wasm32-wasip1/release/crypto_aes.wasm \
           flutter_app/assets/plugins/
        cp target/wasm32-wasip1/release/transport_ntfy.wasm \
           flutter_app/assets/plugins/

    - name: Copy manifests to Flutter assets
      working-directory: void
      run: |
        cp plugins/storage_memory/manifest.toml \
           flutter_app/assets/plugins/storage_memory.manifest.toml
        cp plugins/crypto_aes/manifest.toml \
           flutter_app/assets/plugins/crypto_aes.manifest.toml
        cp plugins/transport_ntfy/manifest.toml \
           flutter_app/assets/plugins/transport_ntfy.manifest.toml

    - name: Create build.gradle
      working-directory: void/flutter_app
      run: |
        cat > android/app/build.gradle << 'EOF'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }

        android {
            namespace = "com.example.messenger_app"
            compileSdk = 34
            ndkVersion = "26.1.10909125"

            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_1_8
                targetCompatibility = JavaVersion.VERSION_1_8
            }

            kotlinOptions {
                jvmTarget = JavaVersion.VERSION_1_8
            }

            defaultConfig {
                applicationId = "com.example.messenger_app"
                minSdk = 24
                targetSdk = 34
                versionCode = ${{ github.run_number }}
                versionName = "0.2.0-alpha+${{ github.run_number }}"
            }

            buildTypes {
                release {
                    signingConfig = signingConfigs.debug
                    minifyEnabled = false
                }
            }
        }

        flutter {
            source = "../.."
        }

        dependencies {}
        EOF

    - name: Create gradle.properties
      working-directory: void/flutter_app
      run: |
        mkdir -p android
        cat > android/gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
        org.gradle.parallel=true
        org.gradle.workers.max=2
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

    - name: Flutter pub get
      working-directory: void/flutter_app
      run: flutter pub get

    - name: Build APK
      working-directory: void/flutter_app
      run: |
        flutter build apk --release --target-platform android-arm64

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: messenger-apk-${{ github.sha }}
        path: void/flutter_app/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Upload WASM plugins
      uses: actions/upload-artifact@v4
      with:
        name: wasm-plugins-${{ github.sha }}
        path: |
          void/flutter_app/assets/plugins/*.wasm
          void/flutter_app/assets/plugins/*.manifest.toml
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          void/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          void/flutter_app/assets/plugins/*.wasm
          void/flutter_app/assets/plugins/*.manifest.toml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
