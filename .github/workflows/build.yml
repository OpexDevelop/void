name: void

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install build tools
        run: |
          sudo apt-get install -y lld gcc-aarch64-linux-gnu

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, aarch64-unknown-linux-gnu

      - name: cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "void"

      - name: build plugins
        run: |
          cargo build -p plugin-crypto --target wasm32-unknown-unknown --release
          cargo build -p plugin-logger --target wasm32-unknown-unknown --release

      - name: build void (linux x64)
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
        run: cargo build -p void --release

      - name: build void (android/aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build -p void --target aarch64-unknown-linux-gnu --release

      - name: package & test
        run: |
          mkdir -p dist/plugins
          mkdir -p dist/android
          
          # Основной билд и плагины
          cp target/release/void dist/
          cp target/wasm32-unknown-unknown/release/*.wasm dist/plugins/
          
          # Бинарник для Термукса
          cp target/aarch64-unknown-linux-gnu/release/void dist/android/
          
          cd dist
          chmod +x void
          echo "[TEST] Запуск проверки..."
          ./void <<EOF
          hello_stage_4
          next_message
          /quit
          EOF

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: void
          path: dist/
