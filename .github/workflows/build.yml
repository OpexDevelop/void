name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: warn

jobs:
  build-core:
    name: Build core (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-core-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release -p core

      - name: Run tests
        run: cargo test -p core

      - name: Upload core binary
        uses: actions/upload-artifact@v4
        with:
          name: core-binary
          path: target/release/core

  build-plugins:
    name: Build Wasm plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip1 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo (wasm)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build plugin-crypto
        run: cargo build --release --target wasm32-wasip1 -p plugin-crypto

      - name: Build plugin-ntfy
        run: cargo build --release --target wasm32-wasip1 -p plugin-ntfy

      - name: Build plugin-storage
        run: cargo build --release --target wasm32-wasip1 -p plugin-storage

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-plugins
          path: |
            target/wasm32-wasip1/release/plugin_crypto.wasm
            target/wasm32-wasip1/release/plugin_ntfy.wasm
            target/wasm32-wasip1/release/plugin_storage.wasm

  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p core -- -D warnings
