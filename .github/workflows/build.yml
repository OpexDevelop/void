name: void

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install build tools
        run: |
          sudo apt-get install -y lld gcc-aarch64-linux-gnu

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, aarch64-unknown-linux-gnu, aarch64-linux-android

      - name: cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "void"

      - name: setup android ndk
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: install cargo-ndk
        run: cargo install cargo-ndk

      - name: build plugins
        run: |
          cargo build -p plugin-crypto --target wasm32-unknown-unknown --release
          cargo build -p plugin-fstransport --target wasm32-unknown-unknown --release
          cargo build -p plugin-storage --target wasm32-unknown-unknown --release
          cargo build -p plugin-omnilogger --target wasm32-unknown-unknown --release

      - name: build cli (linux x64)
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
        run: cargo build -p voidchat --release

      - name: build cli (android/aarch64)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk --target aarch64-linux-android --platform 24 build -p voidchat --release

      - name: package
        run: |
          mkdir -p dist/cli/plugins
          mkdir -p dist/android/cli/plugins
          
          # Linux x64
          cp target/release/voidchat dist/
          cp target/wasm32-unknown-unknown/release/*.wasm dist/cli/plugins/
          cp cli/plugins/*.toml dist/cli/plugins/
          
          # Android
          cp target/aarch64-linux-android/release/voidchat dist/android/
          cp target/wasm32-unknown-unknown/release/*.wasm dist/android/cli/plugins/
          cp cli/plugins/*.toml dist/android/cli/plugins/

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: voidchat
          path: dist/
