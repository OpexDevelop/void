name: void

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install lld
        run: sudo apt-get install -y lld

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "void"

      - name: build plugins
        run: |
          cargo build -p plugin-crypto --target wasm32-unknown-unknown --release
          cargo build -p plugin-logger --target wasm32-unknown-unknown --release

      - name: build void
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
        run: cargo build -p void --release

      - name: package & test
        run: |
          mkdir -p dist/plugins
          cp target/release/void dist/
          cp target/wasm32-unknown-unknown/release/*.wasm dist/plugins/
          
          cd dist
          chmod +x void
          ./void <<EOF
          test_async_message
          /quit
          EOF

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: void
          path: dist/
