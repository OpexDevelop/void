name: void

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # Оставляем глобально только инкрементальную сборку
  CARGO_INCREMENTAL: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install lld
        run: sudo apt-get install -y lld

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "void"

      # Собираем плагин без лишних флагов (он сам знает, как собрать Wasm)
      - name: build plugin
        run: cargo build -p plugin --target wasm32-unknown-unknown --release

      # А вот здесь применяем быстрый линковщик ТОЛЬКО для ядра
      - name: build void
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
        run: cargo build -p void --release

      - name: test
        run: |
          mkdir -p plugins
          cp target/wasm32-unknown-unknown/release/plugin.wasm ./plugins/
          chmod +x ./target/release/void
          ./target/release/void

      - name: package
        run: |
          mkdir -p dist/plugins
          cp target/release/void dist/
          cp ./plugins/plugin.wasm dist/plugins/

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: void
          path: dist/
