build-core:
  name: Build core (${{ matrix.target }})
  runs-on: ${{ matrix.os }}
  strategy:
    fail-fast: false
    matrix:
      include:
        # macOS Apple Silicon (MacBook Air M1/M2/M3)
        - target: aarch64-apple-darwin
          os: macos-latest

        # macOS Intel (для совместимости)
        - target: x86_64-apple-darwin
          os: macos-latest

        # Linux x86_64
        - target: x86_64-unknown-linux-gnu
          os: ubuntu-latest

        # Linux ARM64 (кросс-компиляция)
        - target: aarch64-unknown-linux-gnu
          os: ubuntu-latest

        # Windows x64
        - target: x86_64-pc-windows-gnu
          os: ubuntu-latest

        # Android aarch64 / Termux
        - target: aarch64-linux-android
          os: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - name: Install Rust + target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Install Android NDK (for aarch64-linux-android)
      if: matrix.target == 'aarch64-linux-android'
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Configure linker (cross targets)
      if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'aarch64-linux-android' || matrix.target == 'x86_64-pc-windows-gnu'
      run: |
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << 'EOF'
        [target.aarch64-unknown-linux-gnu]
        linker = "aarch64-linux-gnu-gcc"

        [target.aarch64-linux-android]
        linker = "aarch64-linux-android35-clang"

        [target.x86_64-pc-windows-gnu]
        linker = "x86_64-w64-mingw32-gcc"
        EOF

    - name: Install mingw (Windows cross)
      if: matrix.target == 'x86_64-pc-windows-gnu'
      run: sudo apt-get install -y gcc-mingw-w64-x86-64

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-core-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }} -p core

    - name: Run tests (native only)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: cargo test -p core

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: core-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/core${{ matrix.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}
