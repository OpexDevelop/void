name: Build Android Only

on:
  workflow_dispatch:
  push:
    paths:
      - 'void/flutter_app/**'
      - 'void/core/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk-version: 26.1.10909125

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo
          ~/.gradle
          void/target
        key: ${{ runner.os }}-android-${{ hashFiles('**/*.gradle*', '**/Cargo.lock') }}

    - name: Build Rust Core
      working-directory: void/core
      run: |
        cargo ndk -t arm64-v8a \
          -o ../flutter_app/android/app/src/main/jniLibs \
          build --release

    - name: Build APK
      working-directory: void/flutter_app
      run: |
        flutter pub get
        flutter build apk --release --target-platform android-arm64

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: messenger-apk-${{ github.sha }}
        path: void/flutter_app/build/app/outputs/flutter-apk/app-release.apk
