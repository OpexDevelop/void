[plugin]
id = "storage_memory"
name = "In-Memory Storage"
version = "0.1.0"
category = "storage"
description = "Stores messages in RAM for the current session"

[capabilities]
provides = ["store_message", "get_messages", "clear"]
subscribes_to = ["message_sent", "app_shutdown"]
emits = ["message_stored"]

[permissions]
network = false
filesystem = false
contacts = false
clipboard = false
notifications = false

[limits]
max_memory_mb = 64
timeout_ms = 5000
